# MCMCStrategy config for BTS aerial — better Gaussian distribution outdoor
# Usage: modal run modal_app.py --action train_all --config-name mcmc.yaml
max_steps: 50000
sh_degree: 3
ssim_lambda: 0.2
app_opt: false
antialiased: true
packed: true
use_mcmc: true

eval_steps: [7000, 15000, 30000, 50000]
save_steps: [7000, 15000, 30000, 50000]

background_color: [1.0, 1.0, 1.0]
