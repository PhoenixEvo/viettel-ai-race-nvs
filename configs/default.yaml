# Competition config — gsplat v1.4.0 — BTS aerial outdoor
max_steps: 30000
sh_degree: 3
ssim_lambda: 0.3
app_opt: false
antialiased: true
packed: true
use_mcmc: false

# Outdoor sky/background: prevents Gaussians from memorising black bg
random_bkgd: true

# Bilateral grid: corrects per-image lighting/exposure variation from drone
use_bilateral_grid: true

# DEPTH SUPERVISION from COLMAP sparse points — key PSNR boost for outdoor
depth_loss: true
depth_lambda: 0.01

# Regularization: prune floaters in sparse aerial regions
opacity_reg: 0.01
scale_reg: 0.005

# test_every: 9999 (safe upper bound — Parser auto-assigns all images to train)
test_every: 9999

eval_steps: [7000, 15000, 30000]
save_steps: [7000, 15000, 30000]
