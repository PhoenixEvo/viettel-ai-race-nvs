# Competition config — gsplat simple_trainer (v1.4.0) adapted for BTS aerial
max_steps: 30000
sh_degree: 3
ssim_lambda: 0.2
app_opt: true
antialiased: true
packed: true

# Eval & save
eval_steps: [7000, 15000, 30000]
save_steps: [7000, 15000, 30000]

# data_factor is auto-computed in train.py based on image resolution
# (set manually here only if you want to override auto-detection)
# data_factor: 4

# Background (white = better for outdoor sky)
background_color: [1.0, 1.0, 1.0]
